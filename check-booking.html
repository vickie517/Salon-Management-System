<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Check Booking Status</title>

    <link rel="stylesheet" href="css/style.css">
</head>

<body>

<header>

    <div class="logo">
        <span>LuxeGlow</span>
        <small>Beauty Lounge</small>
    </div>

</header>

<section class="booking">

    <h2>Check Your Appointment Status</h2>

    <p>Enter the phone number you used when making your booking.</p>

    <input
        type="tel"
        id="phone"
        placeholder="Enter your phone number">

    <br><br>

    <button id="checkBtn">
        Check Status
    </button>

    <br><br>

    <div id="result"></div>

</section>

<script type="module" src="js/check-booking.js"></script>

</body>
</html>
